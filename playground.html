<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风格工坊 · 健身小助手</title>
<style>
/* ===== reset & base ===== */
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:"Microsoft YaHei","PingFang SC","Hiragino Sans GB",system-ui,sans-serif;
  background:#0e0e14;
  color:#eaeef2;
  -webkit-font-smoothing:antialiased;
}

/* ===== layout ===== */
.playground{padding:36px 24px 100px;max-width:1200px;margin:0 auto}
.playground-header{text-align:center;margin-bottom:36px}
.playground-header h1{font-size:clamp(1.6rem,3.6vw,2.5rem);font-weight:900;margin:0;background:linear-gradient(135deg,#f0c8a0,#c0a8e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.playground-header p{margin:6px 0 0;color:#8888a0;font-size:.95rem}

/* ===== section labels ===== */
.selector-label{display:flex;align-items:center;gap:10px;margin:0 0 12px;font-size:.82rem;font-weight:700;color:#7878a0;letter-spacing:.04em}
.selector-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06)}

/* ===== theme picker row ===== */
.theme-strip{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:32px}
.theme-chip{
  position:relative;
  display:flex;align-items:center;gap:8px;
  padding:8px 16px 8px 12px;
  border:1.5px solid rgba(255,255,255,0.08);
  border-radius:999px;
  background:rgba(255,255,255,0.03);
  color:#c8cce0;
  font-size:.85rem;font-weight:700;
  cursor:pointer;
  transition:all .25s;
  -webkit-tap-highlight-color:transparent;
  outline-offset:2px;
}
.theme-chip:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.16)}
.theme-chip.is-active{
  background:rgba(255,255,255,0.09);
  border-color:var(--chip-color,rgba(255,255,255,0.3));
  box-shadow:0 0 0 2.5px color-mix(in srgb,var(--chip-color) 25%,transparent),0 10px 24px rgba(0,0,0,0.3);
  color:#fff;
}
.theme-swatch{
  display:block;
  width:16px;height:16px;
  border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.12);
  flex-shrink:0;
}

/* ===== layout picker row ===== */
.layout-strip{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:36px}
.layout-chip{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px 8px 10px;
  border:1.5px solid rgba(255,255,255,0.06);
  border-radius:14px;
  background:rgba(255,255,255,0.02);
  color:#b0b4ca;
  font-size:.82rem;font-weight:600;
  cursor:pointer;
  transition:all .25s;
  -webkit-tap-highlight-color:transparent;
}
.layout-chip:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.12)}
.layout-chip.is-active{
  border-color:rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.07);
  color:#fff;
  box-shadow:0 0 0 2px rgba(255,255,255,0.06);
}
.layout-diagram{
  flex-shrink:0;
  display:grid;gap:2px;
  width:36px;height:28px;
  padding:3px;
  border-radius:5px;
  background:rgba(255,255,255,0.04);
}
.layout-diagram .ld-block{background:rgba(255,255,255,0.15);border-radius:1.5px;min-height:0}
.layout-diagram .ld-block.accent{background:var(--chip-color,rgba(255,255,255,0.25))}

/* ===== main grid ===== */
.playground-grid{
  display:grid;
  grid-template-columns:1fr 300px;
  gap:24px;
  align-items:start;
}
@media(max-width:900px){.playground-grid{grid-template-columns:1fr}}

/* ===== preview pane ===== */
.preview-pane{
  border:1px solid rgba(255,255,255,0.06);
  border-radius:20px;
  background:var(--preview-bg,#f5f6f8);
  overflow:hidden;
  transition:background .5s,box-shadow .5s;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);
}
.preview-scroll{max-height:680px;overflow-y:auto;padding:20px}
.preview-scroll::-webkit-scrollbar{width:4px}
.preview-scroll::-webkit-scrollbar-track{background:transparent}
.preview-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.10);border-radius:99px}

/* ---- layout base ---- */
.preview-pane{
  --gap-lg:24px;
  --gap-md:16px;
  --gap-sm:10px;
}
/* classic - default */
.preview-pane{--section-radius:18px;--section-pad:20px;--section-shadow:0 2px 0 rgba(0,0,0,0.03)}
/* dashboard */
.preview-pane.layout-dashboard{--section-radius:12px;--section-pad:16px;--gap-lg:16px;--gap-md:12px}
/* immersive */
.preview-pane.layout-immersive{--section-radius:0;--section-pad:18px 0;--gap-lg:32px;--gap-md:24px}
.preview-pane.layout-immersive .mini-section{border-color:transparent!important;box-shadow:none!important}
.preview-pane.layout-immersive .mini-hero{border-color:transparent!important;box-shadow:none!important;border-bottom:1px solid rgba(0,0,0,0.04)!important;border-radius:0!important}
.preview-pane.layout-immersive .preview-scroll{padding:4px 20px 20px}
/* mobile cards */
.preview-pane.layout-mobile{--section-radius:24px;--section-pad:18px;--gap-lg:20px;--gap-md:14px}
.preview-pane.layout-mobile .mini-section{box-shadow:0 8px 28px rgba(0,0,0,0.06)!important}
.preview-pane.layout-mobile .mini-hero{box-shadow:0 8px 28px rgba(0,0,0,0.06)!important}

/* ---- inside preview ---- */
.mini-hero{
  display:grid;gap:20px;
  padding:var(--section-pad,22px);
  margin-bottom:var(--gap-lg,24px);
  border:1px solid var(--preview-line,rgba(0,0,0,0.06));
  border-radius:var(--section-radius,18px);
  background:var(--preview-hero-bg,#fff);
  box-shadow:var(--section-shadow);
  transition:background .4s,border-color .4s,box-shadow .4s,border-radius .4s,padding .3s,margin .3s;
}
@media(min-width:600px){.mini-hero{grid-template-columns:1fr 200px}}
.mini-hero h1{margin:0;font-size:clamp(1.2rem,2.6vw,1.8rem);font-weight:900;line-height:1.15;color:var(--preview-text,#101827);transition:color .4s}
.mini-eyebrow{margin:0 0 8px;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--preview-accent,#ef6a2e);transition:color .4s}

.mini-calendar{display:flex;gap:5px;flex-wrap:wrap;padding:6px 0}
.mini-cal-day{
  width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  font-size:.7rem;font-weight:700;
  background:var(--preview-line,rgba(0,0,0,0.05));color:var(--preview-muted,#667085);
  transition:background .4s,color .4s;
}
.mini-cal-day.active{
  background:var(--preview-accent,#ef6a2e);color:#fff;
  box-shadow:0 3px 8px color-mix(in srgb,var(--preview-accent,#ef6a2e) 30%,transparent);
}
.mini-cal-day.rest{opacity:.4}

.mini-section{
  border:1px solid var(--preview-line,rgba(0,0,0,0.06));
  border-radius:var(--section-radius,18px);
  padding:var(--section-pad,20px);
  margin-bottom:var(--gap-lg,24px);
  background:var(--preview-surface,rgba(255,255,255,0.9));
  box-shadow:var(--section-shadow);
  transition:background .4s,border-color .4s,border-radius .4s,padding .3s,margin .3s,box-shadow .4s;
}
.mini-section:last-child{margin-bottom:0}
.mini-section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px}
.mini-section-head h2{margin:0;font-size:.95rem;font-weight:800;color:var(--preview-text,#101827);transition:color .4s}
.mini-section-head .tag{font-size:.62rem;font-weight:800;letter-spacing:.06em;color:var(--preview-accent,#ef6a2e);transition:color .4s}

.mini-freq{display:flex;gap:5px}
.mini-freq button{
  border:0;border-radius:999px;padding:3px 10px;
  font-size:.72rem;font-weight:800;cursor:pointer;
  background:var(--preview-line,rgba(0,0,0,0.04));
  color:var(--preview-muted,#667085);
  transition:background .25s,color .25s;
}
.mini-freq button.active{background:var(--preview-accent,#ef6a2e);color:#fff}

.mini-card-grid{display:grid;gap:10px;grid-template-columns:1fr 1fr}
@media(max-width:480px){.mini-card-grid{grid-template-columns:1fr}}

.mini-exercise{
  display:flex;gap:12px;align-items:center;
  padding:10px 12px;border-radius:12px;
  background:var(--preview-bg,#f5f6f8);
  transition:background .4s;
}
.mini-exercise-icon{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:900;
  background:var(--preview-accent-soft,rgba(239,106,46,0.10));
  color:var(--preview-accent,#ef6a2e);
  transition:background .4s,color .4s;
}
.mini-exercise-info{flex:1;min-width:0}
.mini-exercise-info strong{display:block;font-size:.84rem;color:var(--preview-text,#101827);transition:color .4s}
.mini-exercise-info small{font-size:.7rem;color:var(--preview-muted,#667085);transition:color .4s}

.mini-btn{
  display:inline-flex;align-items:center;gap:8px;
  border:0;border-radius:var(--preview-radius-sm,10px);
  padding:9px 16px;font-size:.82rem;font-weight:800;cursor:pointer;
  transition:background .25s,color .25s,box-shadow .25s;
}
.mini-btn-primary{
  background:var(--preview-btn-bg,#071225);color:#fff;
  box-shadow:0 6px 16px color-mix(in srgb,var(--preview-btn-bg,#071225) 25%,transparent);
}
.mini-btn-ghost{
  background:transparent;color:var(--preview-muted,#667085);
  border:1px solid var(--preview-line,rgba(0,0,0,0.08));
}

.mini-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 10px;border-radius:999px;
  font-size:.68rem;font-weight:800;
  background:var(--preview-green-soft,rgba(47,143,99,0.08));
  color:var(--preview-green,#2f8f63);
  transition:background .4s,color .4s;
}

.mini-coach{
  padding:12px 14px;margin-top:12px;
  border-radius:var(--preview-radius-md,14px);
  background:var(--preview-accent-soft,rgba(239,106,46,0.06));
  font-size:.8rem;line-height:1.6;
  color:var(--preview-text,#101827);
  transition:background .4s,color .4s;
}

/* ===== sidebar ===== */
.sidebar-panel{
  border:1px solid rgba(255,255,255,0.06);
  border-radius:20px;
  background:rgba(255,255,255,0.03);
  padding:20px;
  position:sticky;top:24px;
  transition:border-color .4s,background .4s;
}
.sidebar-tabs{
  display:flex;gap:4px;margin-bottom:18px;
  padding:4px;border-radius:12px;background:rgba(255,255,255,0.04);
}
.sidebar-tab{
  flex:1;padding:7px;border:0;border-radius:9px;
  font-size:.75rem;font-weight:700;cursor:pointer;
  background:transparent;color:#7a7a96;
  transition:all .25s;
}
.sidebar-tab.is-active{background:rgba(255,255,255,0.08);color:#e0e4f0}
.sidebar-content{display:none}
.sidebar-content.is-active{display:block}

.palette-grid{display:grid;gap:10px}
.palette-item{display:flex;align-items:center;gap:10px}
.palette-swatch{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  border:1px solid rgba(255,255,255,0.05);
  transition:background .4s;
}
.palette-info{flex:1;min-width:0}
.palette-info strong{display:block;font-size:.76rem;color:#c8ccdc;transition:color .4s}
.palette-info small{font-size:.64rem;color:#6a6a88;word-break:break-all;transition:color .4s}

.sidebar-desc{margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.05)}
.sidebar-desc p{font-size:.8rem;line-height:1.7;color:#8a8aaa;margin:0}
.sidebar-desc .keywords{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.sidebar-desc .keywords span{
  padding:3px 10px;border-radius:999px;font-size:.7rem;font-weight:700;
  background:rgba(255,255,255,0.05);color:#999abb;
}

/* ===== floating apply btn ===== */
.fab{
  position:fixed;
  bottom:32px;right:32px;
  display:flex;align-items:center;gap:8px;
  padding:14px 24px;
  border:0;border-radius:999px;
  font-size:.92rem;font-weight:800;cursor:pointer;
  color:#fff;
  background:var(--fab-color,#7C3AED);
  box-shadow:0 8px 28px color-mix(in srgb,var(--fab-color,#7C3AED) 35%,transparent),0 2px 8px rgba(0,0,0,0.15);
  transition:transform .2s,background .4s,box-shadow .4s;
  z-index:100;
  -webkit-tap-highlight-color:transparent;
}
.fab:hover{transform:translateY(-2px) scale(1.02)}
.fab:active{transform:translateY(0) scale(.98)}
.fab-icon{font-size:1.2rem;line-height:1}

/* ===== snackbar ===== */
.snackbar{
  position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(80px);
  padding:12px 24px;border-radius:12px;
  background:rgba(20,22,36,0.95);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.06);
  color:#e0e4f0;font-size:.84rem;font-weight:600;
  opacity:0;transition:transform .4s ease,opacity .4s ease;
  z-index:101;pointer-events:none;white-space:nowrap;
}
.snackbar.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .playground{padding:24px 16px 90px}
  .fab{bottom:20px;right:20px;padding:12px 20px;font-size:.84rem}
}

/* scrollbar for the whole page */
body::-webkit-scrollbar{width:4px}
body::-webkit-scrollbar-track{background:transparent}
body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:99px}
</style>
</head>
<body>

<div class="playground">
  <header class="playground-header">
    <h1>✦ 风格工坊</h1>
    <p>选配色 + 排版方案，一键应用</p>
  </header>

  <!-- Color Themes -->
  <div class="selector-label">色彩主题</div>
  <div class="theme-strip" id="themeStrip"></div>

  <!-- Layout Schemes -->
  <div class="selector-label">排版方案</div>
  <div class="layout-strip" id="layoutStrip"></div>

  <div class="playground-grid">
    <!-- preview -->
    <div class="preview-pane" id="previewPane">
      <div class="preview-scroll" id="previewScroll">
        <!-- hero -->
        <div class="mini-hero">
          <div>
            <p class="mini-eyebrow">训练节奏</p>
            <h1>按计划行事</h1>
          </div>
          <div>
            <div class="mini-calendar">
              <span class="mini-cal-day active">一</span>
              <span class="mini-cal-day active">二</span>
              <span class="mini-cal-day rest">三</span>
              <span class="mini-cal-day active">四</span>
              <span class="mini-cal-day">五</span>
              <span class="mini-cal-day rest">六</span>
              <span class="mini-cal-day rest">日</span>
            </div>
            <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
              <span class="mini-badge">增肌</span>
              <span class="mini-badge" style="background:var(--preview-line,rgba(0,0,0,0.05));color:var(--preview-muted,#667085)">BMI 21.5</span>
            </div>
          </div>
        </div>

        <!-- weekly plan -->
        <div class="mini-section">
          <div class="mini-section-head">
            <div><span class="tag">本周安排</span><h2>今天练哪天，点一下就行</h2></div>
            <div class="mini-freq"><button>3练</button><button class="active">4练</button><button>5练</button></div>
          </div>
          <div style="display:grid;gap:8px;grid-template-columns:repeat(4,1fr)">
            <div style="padding:10px;border-radius:10px;background:var(--preview-accent,#ef6a2e);color:#fff;font-size:.72rem;font-weight:700;text-align:center;transition:background .4s">胸</div>
            <div style="padding:10px;border-radius:10px;background:var(--preview-line,rgba(0,0,0,0.05));color:var(--preview-muted,#667085);font-size:.72rem;font-weight:700;text-align:center;transition:background .4s,color .4s">背</div>
            <div style="padding:10px;border-radius:10px;background:var(--preview-accent,#ef6a2e);color:#fff;font-size:.72rem;font-weight:700;text-align:center;transition:background .4s">腿</div>
            <div style="padding:10px;border-radius:10px;background:var(--preview-line,rgba(0,0,0,0.05));color:var(--preview-muted,#667085);font-size:.72rem;font-weight:700;text-align:center;transition:background .4s,color .4s">肩</div>
          </div>
        </div>

        <!-- tonight -->
        <div class="mini-section">
          <div class="mini-section-head">
            <div><span class="tag">今晚训练</span><h2>胸部训练 · 推的日</h2></div>
            <span style="font-size:.7rem;font-weight:700;color:var(--preview-muted,#667085);transition:color .4s">2/6</span>
          </div>
          <div class="mini-card-grid">
            <div class="mini-exercise">
              <div class="mini-exercise-icon">A</div>
              <div class="mini-exercise-info">
                <strong>杠铃卧推</strong>
                <small>4组×8-12次 · 休息90s</small>
              </div>
            </div>
            <div class="mini-exercise">
              <div class="mini-exercise-icon">B</div>
              <div class="mini-exercise-info">
                <strong>上斜哑铃卧推</strong>
                <small>3组×10-12次 · 休息75s</small>
              </div>
            </div>
            <div class="mini-exercise">
              <div class="mini-exercise-icon">C</div>
              <div class="mini-exercise-info">
                <strong>龙门架夹胸</strong>
                <small>3组×15次 · 休息60s</small>
              </div>
            </div>
            <div class="mini-exercise">
              <div class="mini-exercise-icon">D</div>
              <div class="mini-exercise-info">
                <strong>哑铃飞鸟</strong>
                <small>3组×12-15次 · 休息60s</small>
              </div>
            </div>
          </div>
          <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">
            <button class="mini-btn mini-btn-primary">今日完成打卡</button>
            <button class="mini-btn mini-btn-ghost">看器械</button>
          </div>
          <div class="mini-coach">💡 重量以最后 2 次较吃力，但动作不乱、不借力为准。</div>
        </div>

        <!-- recovery -->
        <div class="mini-section" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 18px">
          <div><strong style="font-size:.76rem;display:block;color:var(--preview-text,#101827);transition:color .4s">拉伸</strong><small style="font-size:.68rem;color:var(--preview-muted,#667085);transition:color .4s">5-10 分钟</small></div>
          <div><strong style="font-size:.76rem;display:block;color:var(--preview-text,#101827);transition:color .4s">恢复</strong><small style="font-size:.68rem;color:var(--preview-muted,#667085);transition:color .4s">2-3 天休息</small></div>
          <div><strong style="font-size:.76rem;display:block;color:var(--preview-text,#101827);transition:color .4s">饮食</strong><small style="font-size:.68rem;color:var(--preview-muted,#667085);transition:color .4s">1h 内补充</small></div>
          <div><strong style="font-size:.76rem;display:block;color:var(--preview-text,#101827);transition:color .4s">不会？</strong><small style="font-size:.68rem;color:var(--preview-muted,#667085);transition:color .4s">轻重量试</small></div>
        </div>
      </div>
    </div>

    <!-- sidebar -->
    <div class="sidebar-panel" id="sidebarPanel">
      <div class="sidebar-tabs">
        <button class="sidebar-tab is-active" data-panel="colors">🎨 色彩</button>
        <button class="sidebar-tab" data-panel="layout">🧩 排版</button>
      </div>
      <div class="sidebar-content is-active" id="colorsPanel">
        <div class="palette-grid" id="paletteGrid"></div>
        <div class="sidebar-desc" id="colorDesc"></div>
      </div>
      <div class="sidebar-content" id="layoutPanel">
        <div id="layoutDetail"></div>
      </div>
    </div>
  </div>
</div>

<button class="fab" id="fabBtn"><span class="fab-icon">🖌</span> 应用此方案</button>
<div class="snackbar" id="snackbar"></div>

<script>
// ===== THEMES =====
const themes = [
  { id:'blaze', name:'燃橙 · Blaze', desc:'充满活力的暖橙色调，激发训练热情。橙色的高冲击力与白色空间形成鲜明对比，适合追求能量的健身者。', keywords:['充满力量','暖色调','高对比','活力'],
    chipColor:'#ef6a2e',
    palettes:[
      {label:'主色',color:'#ef6a2e'},{label:'主色按压',color:'#bc4d18'},{label:'主色淡',color:'#fff1ea'},
      {label:'背景',color:'#f5f6f8'},{label:'表面',color:'#ffffff'},{label:'文字',color:'#101827'},
      {label:'次要文字',color:'#667085'},{label:'绿色',color:'#2f8f63'},{label:'深色/导航',color:'#071225'},

let currentTheme = themes[0];
let currentLayout = layouts[0];

// ===== render =====
const themeStrip = document.getElementById('themeStrip');
const layoutStrip = document.getElementById('layoutStrip');
const paletteGrid = document.getElementById('paletteGrid');
const colorDesc = document.getElementById('colorDesc');
const layoutDetail = document.getElementById('layoutDetail');
const previewPane = document.getElementById('previewPane');
const fab = document.getElementById('fabBtn');

function renderThemeChips(){
  themeStrip.innerHTML = themes.map(t =>
    `<button class="theme-chip${t.id===currentTheme.id?' is-active':''}" data-id="${t.id}" style="--chip-color:${t.chipColor}">
      <span class="theme-swatch" style="background:${t.chipColor}"></span>
      <span>${t.name}</span>
    </button>`
  ).join('');
}

function renderLayoutChips(){
  layoutStrip.innerHTML = layouts.map((l,i)=>{
    const active = l.id===currentLayout.id?' is-active':'';
    // build diagram svg
    const rows = l.diagrams.map(row => {
      const cells = row.map(c => {
        const w = 100/row.length;
        const cls = c===0?'ld-block accent':c>0?'ld-block':'';
        return `<div class="${cls}" style="width:${w}%;height:100%"></div>`;
      }).join('');
      return `<div style="display:flex;gap:1.5px;height:${100/l.diagrams.length}%">${cells}</div>`;
    }).join('');
    return `<button class="layout-chip${active}" data-id="${l.id}" style="--chip-color:${currentTheme.chipColor}">
      <div class="layout-diagram">${rows}</div>
      <span>${l.name}</span>
    </button>`;
  }).join('');
}

function renderPalette(){
  paletteGrid.innerHTML = currentTheme.palettes.map(p =>
    `<div class="palette-item">
      <div class="palette-swatch" style="background:${p.color}"></div>
      <div class="palette-info"><strong>${p.label}</strong><small>${p.color}</small></div>
    </div>`
  ).join('');
  colorDesc.innerHTML = `
    <p>${currentTheme.desc}</p>
    <div class="keywords">${currentTheme.keywords.map(k=>'<span>'+k+'</span>').join('')}</div>
  `;
}

function renderLayoutDetail(){
  const l = currentLayout;
  layoutDetail.innerHTML = `
    <div class="palette-grid">
      <div style="margin-bottom:8px">
        <strong style="font-size:.88rem;color:#e0e4f0">${l.name}</strong>
        <p style="font-size:.8rem;color:#8a8aaa;line-height:1.7;margin:8px 0 0">${l.desc}</p>
      </div>
    </div>
    <div class="sidebar-desc">
      <div class="keywords">${l.keywords.map(k=>'<span>'+k+'</span>').join('')}</div>
    </div>
    <!-- diagram legend -->
    <div style="margin-top:16px;display:grid;gap:6px;font-size:.7rem;color:#7a7a96">
      ${Object.entries(l.diagramLegend).filter(([k,v])=>v).map(([k,v])=>{
        const colors = ['rgba(255,255,255,0.25)','rgba(255,255,255,0.20)','rgba(255,255,255,0.15)','rgba(255,255,255,0.12)','rgba(255,255,255,0.08)'];
        return `<div style="display:flex;align-items:center;gap:8px"><span style="width:12px;height:12px;border-radius:3px;background:${colors[k]};flex-shrink:0"></span>${v}</div>`;
      }).join('')}
    </div>
  `;
}

function applyTheme(){
  const v = currentTheme.vars;
  Object.keys(v).forEach(k => previewPane.style.setProperty(k, v[k]));
  // layout class
  previewPane.className = 'preview-pane ' + currentLayout.className;
  // fab color
  fab.style.setProperty('--fab-color', currentTheme.chipColor);
  // update layout chip accent color
  document.querySelectorAll('.layout-chip').forEach(el => {
    el.style.setProperty('--chip-color', currentTheme.chipColor);
  });
}

function selectTheme(id){
  const t = themes.find(x => x.id===id);
  if(!t || t.id===currentTheme.id) return;
  currentTheme = t;
  renderThemeChips();
  renderPalette();
  // re-render layout chips to update accent
  renderLayoutChips();
  applyTheme();
}

function selectLayout(id){
  const l = layouts.find(x => x.id===id);
  if(!l || l.id===currentLayout.id) return;
  currentLayout = l;
  renderLayoutChips();
  renderLayoutDetail();
  applyTheme();
  // active state
  document.querySelectorAll('.layout-chip').forEach(el => el.classList.toggle('is-active', el.dataset.id===id));
}

// ===== events =====
themeStrip.addEventListener('click', e => {
  const btn = e.target.closest('.theme-chip');
  if(btn) selectTheme(btn.dataset.id);
});

layoutStrip.addEventListener('click', e => {
  const btn = e.target.closest('.layout-chip');
  if(btn) selectLayout(btn.dataset.id);
});

// sidebar tabs
document.querySelectorAll('.sidebar-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-tab').forEach(t=>t.classList.remove('is-active'));
    document.querySelectorAll('.sidebar-content').forEach(c=>c.classList.remove('is-active'));
    tab.classList.add('is-active');
    document.getElementById(tab.dataset.panel+'Panel').classList.add('is-active');
  });
});

// ===== apply =====
const snackbar = document.getElementById('snackbar');
let snackTimer;
function showSnack(msg){
  clearTimeout(snackTimer);
  snackbar.textContent = msg;
  snackbar.classList.add('show');
  snackTimer = setTimeout(() => snackbar.classList.remove('show'), 3000);
}

fab.addEventListener('click', () => {
  showSnack(`✓ 已记录: ${currentTheme.name} + ${currentLayout.name} — 告诉我就帮你更新主站`);
});

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight' || e.key==='ArrowLeft'){
    const idx = themes.findIndex(t => t.id===currentTheme.id);
    const next = e.key==='ArrowRight' ? (idx+1)%themes.length : (idx-1+themes.length)%themes.length;
    selectTheme(themes[next].id);
  }
});

// ===== init =====
renderThemeChips();
renderLayoutChips();
renderPalette();
renderLayoutDetail();
applyTheme();
</script>
